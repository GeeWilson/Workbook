<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNS Workbook Layout</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <header class="app-bar" role="banner" aria-label="Application bar">
        <a class="brand-link" href="#" aria-label="Thornbury Nursing Services home">
          <img class="brand-logo" src="assets/tns-logo.svg" alt="Thornbury Nursing Services" />
        </a>
      </header>

      <div class="content-grid">
        <main class="body-region" role="main" aria-label="Body content">
          <nav class="breadcrumbs" aria-label="Breadcrumb">
            <a href="#">Dashboard</a>
            <span>/</span>
            <a href="#">Section Name</a>
            <span>/</span>
            <span>Page Name</span>
          </nav>

          <section class="body-panel" aria-label="Main content placeholder">
            <h1 class="heading-1">Hello World</h1>
            <p class="body-text">Body content region placeholder.</p>
          </section>
        </main>

        <aside class="navigation-region" aria-label="Navigation region">
          <h2 class="heading-3">Navigation</h2>
          <ul class="nav-list">
            <li><a href="#">Menu item one</a></li>
            <li><a href="#">Menu item two</a></li>
            <li><a href="#">Menu item three</a></li>
            <li><a href="#">Menu item four</a></li>
          </ul>
        </aside>
      </div>
    </div>
  </body>
</html>
